# Layer 6 — Ollama KV-cache tuning (installed to
# /etc/systemd/system/ollama.service.d/10-kv-cache.conf).
#
# Large context windows need a large KV cache. Hermes Agent requires a ≥64K
# window, and a 64K f16 cache for the 36B model pushes ~half the weights onto
# the CPU on a 24 GB card. Flash attention + q8_0 KV quantization roughly halves
# the cache footprint (negligible quality loss), keeping more of the model
# GPU-resident and generation faster.
[Service]
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="OLLAMA_KV_CACHE_TYPE=q8_0"
